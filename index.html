<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de Dores & Ideias</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #fffff;
    --surface: #161618;
    --border: #2a2a2e;
    --text: #e8e8e8;
    --muted: #888;
    --accent: #f0c040;

    --c1: #ff6b6b; /* Saúde */
    --c2: #a78bfa; /* Saúde Mental */
    --c3: #34d399; /* Idosos & Cuidados */
    --c4: #60a5fa; /* Infância & Família */
    --c5: #fb923c; /* Trabalho & Carreira */
    --c6: #f472b6; /* Segurança */
    --c7: #4ade80; /* Educação */
    --c8: #38bdf8; /* Finanças */
    --c9: #e879f9; /* Relacionamentos */
    --c10: #facc15; /* Burocracia */
    --c11: #94a3b8; /* Cidade & Cotidiano */
    --c12: #fb7185; /* Indústria & Agro */
    --c13: #6ee7b7; /* Criadores */
    --c14: #c084fc; /* Invisibilidade Social */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    padding: 3rem 2rem 2rem;
    border-bottom: 1px solid var(--border);
    max-width: 1200px;
    margin: 0 auto;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    line-height: 1;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }

  header p {
    color: var(--muted);
    font-size: 0.95rem;
  }

  .stats {
    display: flex;
    gap: 2rem;
    margin-top: 1.5rem;
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }

  .stat span:first-child {
    font-size: 1.8rem;
    font-weight: 600;
    color: var(--accent);
    font-family: 'DM Serif Display', serif;
  }

  .stat span:last-child {
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .controls {
    padding: 1.5rem 2rem;
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }

  .controls label {
    font-size: 0.8rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-right: 0.25rem;
  }

  .filter-btn {
    padding: 0.4rem 1rem;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }

  .search-wrap {
    margin-left: auto;
    position: relative;
  }

  .search-wrap input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.4rem 1rem 0.4rem 2.2rem;
    border-radius: 999px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    width: 220px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap::before { content: '⌕'; position: absolute; left: 0.7rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 1rem; pointer-events: none; }

  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem;
    display: grid;
    gap: 1.5rem;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  }

  .theme-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .theme-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .theme-card.hidden { display: none; }

  .theme-header {
    padding: 1rem 1.25rem 0.85rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }

  .theme-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex;align-items:center;justify-content:center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  .theme-title {
    flex: 1;
  }

  .theme-title h2 {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
  }

  .theme-title small {
    font-size: 0.75rem;
    color: var(--muted);
  }

  .badge {
    font-size: 0.7rem;
    font-weight: 700;
    padding: 0.2rem 0.55rem;
    border-radius: 999px;
    background: rgba(255,255,255,0.07);
    color: var(--muted);
  }

  .chevron {
    color: var(--muted);
    font-size: 0.8rem;
    transition: transform 0.2s;
  }

  .theme-card.open .chevron { transform: rotate(180deg); }

  .theme-items {
    display: none;
    padding: 0.5rem 0;
  }

  .theme-card.open .theme-items { display: block; }

  .item {
    padding: 0.75rem 1.25rem;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    cursor: pointer;
    transition: background 0.1s;
  }

  .item:last-child { border-bottom: none; }
  .item:hover { background: rgba(255,255,255,0.04); }
  .item.selected { background: rgba(240,192,64,0.07); border-left: 2px solid var(--accent); }

  .item-text {
    font-size: 0.85rem;
    line-height: 1.5;
    color: #ccc;
  }

  .item-text strong {
    color: var(--text);
    font-weight: 500;
  }

  .item-tags {
    margin-top: 0.4rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
  }

  .tag {
    font-size: 0.68rem;
    padding: 0.15rem 0.5rem;
    border-radius: 999px;
    background: rgba(255,255,255,0.06);
    color: var(--muted);
  }

  .tag.cross { background: rgba(240,192,64,0.12); color: var(--accent); }

  .empty-state {
    display: none;
    grid-column: 1/-1;
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }

  .empty-state.visible { display: block; }

  .color-bar {
    height: 3px;
    width: 100%;
  }

  .item.highlight { background: rgba(240,192,64,0.05); }

  mark {
    background: rgba(240,192,64,0.3);
    color: inherit;
    border-radius: 2px;
    padding: 0 1px;
  }

  @media (max-width: 600px) {
    .main { grid-template-columns: 1fr; padding: 1rem; }
    .controls { padding: 1rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Mapa de Dores & Ideias</h1>
  <p>Todas as dores organizadas por tema — clique para expandir, pesquise, filtre.</p>
  <div class="stats">
    <div class="stat"><span id="total-count">0</span><span>Dores mapeadas</span></div>
    <div class="stat"><span id="theme-count">0</span><span>Temas</span></div>
    <div class="stat"><span id="visible-count">0</span><span>Visíveis agora</span></div>
  </div>
</header>

<div class="controls">
  <label>Filtrar:</label>
  <button class="filter-btn active" onclick="filterAll(this)">Todos</button>
  <button class="filter-btn" onclick="filterCross(this)" title="Dores que conectam múltiplos temas">🔗 Conexões</button>
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Buscar dore..." oninput="doSearch(this.value)">
  </div>
</div>

<div class="main" id="main"></div>
<div class="empty-state" id="empty">Nenhuma dor encontrada. Tente outro termo.</div>

<script>

  {
    id: 'saude-mental',
    icon: '🧠',

// Cross-cutting tags that appear in 3+ themes
const crossTags = ['monitoramento', 'burocracia', 'saúde mental', 'comunicação', 'isolamento', 'acesso', 'sistema de saúde'];

function render(filterFn, highlightTerm) {
  const main = document.getElementById('main');
  main.innerHTML = '';
  let visibleCards = 0;
  let visibleItems = 0;

  themes.forEach(theme => {
    const matchingItems = theme.items.filter(item => filterFn(item, theme));
    if (matchingItems.length === 0) return;
    visibleCards++;

    const card = document.createElement('div');
    card.className = 'theme-card';
    card.id = 'card-' + theme.id;

    const colorStyle = `background:${theme.color}22;color:${theme.color}`;
    const bar = `<div class="color-bar" style="background:${theme.color}"></div>`;

    card.innerHTML = `
      ${bar}
      <div class="theme-header" onclick="toggleCard('${theme.id}')">
        <div class="theme-icon" style="${colorStyle}">${theme.icon}</div>
        <div class="theme-title">
          <h2>${theme.title}</h2>
          <small>${theme.subtitle}</small>
        </div>
        <span class="badge">${matchingItems.length}</span>
        <span class="chevron">▼</span>
      </div>
      <div class="theme-items">
        ${matchingItems.map((item, i) => {
          let text = item.text;
          if (highlightTerm) {
            const re = new RegExp(`(${highlightTerm.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
            text = text.replace(re, '<mark>$1</mark>');
          }
          const tagsHtml = item.tags.map(t => {
            const isCross = item.tags.filter(t2 => t2 === t).length > 0;
            return `<span class="tag">${t}</span>`;
          }).join('');
          visibleItems++;
          return `<div class="item"><div class="item-text">${text}</div><div class="item-tags">${tagsHtml}</div></div>`;
        }).join('')}
      </div>
    `;

    main.appendChild(card);
  });

  document.getElementById('visible-count').textContent = visibleItems;
  document.getElementById('empty').className = visibleCards === 0 ? 'empty-state visible' : 'empty-state';

  // Auto-open if few cards
  if (visibleCards <= 3) {
    document.querySelectorAll('.theme-card').forEach(c => c.classList.add('open'));
  }
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  card.classList.toggle('open');
}

let currentFilter = 'all';
let currentSearch = '';

function applyFilters() {
  render(item => {
    const searchOk = !currentSearch || item.text.toLowerCase().includes(currentSearch.toLowerCase()) || item.tags.some(t => t.toLowerCase().includes(currentSearch.toLowerCase()));
    const crossOk = currentFilter !== 'cross' || item.tags.some(t => crossTags.includes(t));
    return searchOk && crossOk;
  }, currentSearch);
}

function filterAll(btn) {
  currentFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function filterCross(btn) {
  currentFilter = 'cross';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function doSearch(val) {
  currentSearch = val;
  applyFilters();
  if (val.length > 1) {
    document.querySelectorAll('.theme-card').forEach(c => c.classList.add('open'));
  }
}

// Init stats
document.getElementById('theme-count').textContent = themes.length;
let totalItems = 0;
themes.forEach(t => totalItems += t.items.length);
document.getElementById('total-count').textContent = totalItems;
document.getElementById('visible-count').textContent = totalItems;

// Initial render
render(() => true, '');
</script>
